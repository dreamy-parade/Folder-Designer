<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Folder Designer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/themes/nano.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Geo:ital@0;1&family=LINE+Seed+JP&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/pickr.min.js"></script>
    <script src="assets/svg.js"></script>
  </head>

  <body class="bg-gray-100">
  
    <div id="app" class="flex h-screen flex-col-reverse md:flex-row-reverse">

      <!-- サイドバー -->
      <aside class="w-full md:w-80 bg-white p-8 overflow-y-auto overflow-x-hidden space-y-6">

        <!-- カラー -->
        <h2 class="text-2xl font-bold flex p-1 gap-1 items-center border-b-2">
          <div class="w-3 h-3 bg-gray-400 rounded-full"></div>
          Color
        </h2>
        <div class="grid auto-cols-max gap-2 justify-items-start justify-around md:justify-between">
          <div class="flex flex-row-reverse gap-2 items-center">
            <label class="block text-xs mb-1">Folder - 1</label>
            <div id="color-picker"></div>
          </div>
          <div class="flex flex-row-reverse gap-2 items-center">
            <label class="block text-xs mb-1">Folder - 2</label>
            <div id="color-picker-2"></div>
          </div>
          <div class="flex flex-row-reverse gap-2 items-center">
            <label class="block text-xs mb-1">Icon</label>
            <div id="color-picker-icon"></div>
          </div>
          <div class="flex flex-row-reverse gap-2 items-center">
            <label class="block text-xs mb-1">Shadow</label>
            <div id="color-picker-shadow"></div>
          </div>
          <div class="w-full mt-4 col-span-2">
            <label class="block text-xs mb-1">Shadow opacity</label>
            <input type="range" min="0" max="1" step="0.1" v-model="state.shadowOpacity" class="w-full" />
          </div>
        </div>

        <!-- 画像 -->
        <h2 class="text-2xl font-bold flex p-1 gap-1 items-center border-b-2">
          <div class="w-3 h-3 bg-gray-400 rounded-full"></div>
          Image
        </h2>
        <div>
          <label class="inline-block px-3 py-2 bg-teal-400 text-sm text-white rounded cursor-pointer hover:bg-teal-300 transition">
            Choose File
            <input
              type="file"
              accept="image/png,image/jpeg,image/webp"
              @change="onImageUpload"
              class="hidden"
            />
          </label>
        </div>

        <!-- アイコン -->
        <h2 class="text-2xl font-bold flex p-1 gap-1 items-center border-b-2">
          <div class="w-3 h-3 bg-gray-400 rounded-full"></div>
          Icon
        </h2>
        <div>
          <!-- 検索 -->
          <input
            v-model="iconQuery"
            placeholder="Search..."
            class="w-full border rounded px-2 py-1 mb-2 text-sm"
          />

          <!-- グリッド -->
          <div class="grid grid-cols-4 gap-2 p-1 max-h-40 bg-gray-100 overflow-y-auto border rounded-md">
            <button
              v-for="icon in filteredIcons"
              :key="icon.name"
              @click="selectIcon(icon)"
              class="p-2 border rounded bg-white transition hover:scale-[1.1]"
              :class="[
                'p-2 border rounded',
                selectedIcon && selectedIcon.name === icon.name ? 'ring-2 ring-teal-400' : ''
              ]"
            >
              <svg viewBox="0 0 24 24" class="w-6 h-6 mx-auto">
                <template v-for="(p, i) in icon.path" :key="i">
                  <path :d="p.d" fill="currentColor" :fill-rule="p.rule || 'nonzero'"/>
                </template>
              </svg>
            </button>
          </div>
        </div>

        <div class="text-xs text-gray-400 mt-6">
          Created by <a href="https://x.com/dreamy_parade">@dreamy_parade</a>
        </div>
      </aside>

      <!-- メイン -->
      <main class="flex-1 flex flex-col items-center justify-center relative my-8">

        <!-- プレビュー -->
        <div
          class="bg-white px-10 py-6 rounded-xl drop-shadow-lg relative group"
          @pointerenter="isHoveringCanvas = true"
          @pointerleave="isHoveringCanvas = false"
        >

          <svg
            id="my-folder"
            viewBox="0 0 90 90"
            class="w-full h-full"
            @wheel.prevent="onWheel"
            @pointerdown="onPointerDown"
            @pointermove="onPointerMove"
            @pointerup="onPointerUp"
            @pointercancel="onPointerUp"
            @click="onCanvasClick"
          >
            <defs>
              <linearGradient id="folderGrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" :stop-color="state.color" />
                <stop offset="100%" :stop-color="state.color2" />
              </linearGradient>
              <linearGradient id="folderGrad2" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" :stop-color="state.color2" />
                <stop offset="100%" :stop-color="state.color" />
              </linearGradient>
              <linearGradient id="edgeGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#ffffff" />
                <stop offset="100%" :stop-color="state.color2" />
              </linearGradient>
              <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow
                  dx="0" dy="0"
                  :stdDeviation="state.shadowBlur"
                  :flood-color="state.shadowColor"
                  :flood-opacity="state.shadowOpacity"
                />
              </filter>
            </defs>

            <!-- フォルダ本体 -->
            <path
              d="M3.649 80.444h82.703c2.015 0 3.649-1.634 3.649-3.649v-56.12c0-2.015-1.634-3.649-3.649-3.649H35.525c-1.909 0-3.706-.903-4.846-2.435l-2.457-3.301c-.812-1.092-2.093-1.735-3.454-1.735H3.649C1.634 9.556 0 11.19 0 13.205v63.591c0 2.014 1.634 3.648 3.649 3.648z"
              fill="url(#folderGrad2)"
            />

            <!-- 前面 -->
            <defs>
              <!-- 切り抜き用 -->
              <clipPath id="cut-off">
                <path d="M86.351 80.444H3.649C1.634 80.444 0 78.81 0 76.795V29.11c0-2.015 1.634-3.649 3.649-3.649h82.703c2.015 0 3.649 1.634 3.649 3.649v47.685c0 2.015-1.634 3.649-3.649 3.649z" />
              </clipPath>
            </defs>
            <path
              d="M86.351 80.444H3.649C1.634 80.444 0 78.81 0 76.795V29.11c0-2.015 1.634-3.649 3.649-3.649h82.703c2.015 0 3.649 1.634 3.649 3.649v47.685c0 2.015-1.634 3.649-3.649 3.649z"
              fill="url(#folderGrad)"
              stroke="url(#edgeGrad)" stroke-width="2" stroke-opacity="0.5" clip-path="url(#cut-off)"
              
            />

            <g pointer-events="none">
              <!-- 縦線 -->
              <line
                x1="45" y1="0"
                x2="45" y2="90"
                stroke="#3b82f6"
                stroke-width="0.5"
                stroke-dasharray="2 2"
                :opacity="guide.showX ? 0.6 : 0"
                style="transition: opacity 0.15s ease"
              />
              <!-- 横線 -->
              <line
                x1="0" y1="52"
                x2="90" y2="52"
                stroke="#3b82f6"
                stroke-width="0.5"
                stroke-dasharray="2 2"
                :opacity="guide.showY ? 0.6 : 0"
                style="transition: opacity 0.15s ease"
              />
            </g>

            <!-- 画像 -->
            <g v-if="imageData">
              <rect
                v-if="activeTarget === 'image'"
                :x="state.imagePos.x - state.imageSize / 2 - 1"
                :y="state.imagePos.y - state.imageSize / 2 - 1"
                :width="state.imageSize + 2"
                :height="state.imageSize + 2"
                fill="none"
                stroke="#3b82f6"
                stroke-width="0.8"
                pointer-events="none"
              />
              <image
                :href="imageData"
                :x="state.imagePos.x - state.imageSize / 2"
                :y="state.imagePos.y - state.imageSize / 2"
                :width="state.imageSize"
                :height="state.imageSize"
                filter="url(#shadow)"
                @pointerdown="startDrag($event, 'image')"
                @click.stop="onImageClick"
                :class="isDragging ? 'cursor-grabbing' : 'cursor-grab'"
              />
              <g
                v-if="activeTarget === 'image'"
                @click.stop="removeImage"
                class="cursor-pointer"
                :transform="`translate(${state.imagePos.x + state.imageSize/2}, ${state.imagePos.y - state.imageSize/2})`"
              >
                <circle r="4" fill="rgba(0,0,0,1)" />
                <text x="0" y="2" text-anchor="middle" font-size="6" fill="white">×</text>
              </g>
            </g>

            <!-- アイコン -->
            <g v-if="selectedIcon">
              <rect
                v-if="activeTarget === 'icon'"
                :x="state.iconPos.x - (iconBBox.width / 2) * state.iconScale - 2"
                :y="state.iconPos.y - (iconBBox.height / 2) * state.iconScale - 2"
                :width="iconBBox.width * state.iconScale + 4"
                :height="iconBBox.height * state.iconScale + 4"
                fill="none"
                stroke="#3b82f6"
                stroke-width="0.8"
                pointer-events="none"
              />
              <g
                :transform="`
                  translate(${state.iconPos.x}, ${state.iconPos.y})
                  scale(${state.iconScale})
                  translate(${-iconCenterCache.x}, ${-iconCenterCache.y})
                `"
                @pointerdown="startDrag($event, 'icon')"
                @click.stop="onIconClick"
                :class="isDragging ? 'cursor-grabbing' : 'cursor-grab'"
              >
                <path
                  v-for="(p,i) in selectedIcon.path"
                  :key="i"
                  :d="p.d"
                  :fill="state.iconColor"
                  :fill-rule="p.rule || 'nonzero'"
                  filter="url(#shadow)"
                />
              </g>
              <g
                v-if="activeTarget === 'icon'"
                @click.stop="removeIcon"
                class="cursor-pointer"
                :transform="`translate(${state.iconPos.x + (iconBBox.width/2)*state.iconScale}, ${state.iconPos.y - (iconBBox.height/2)*state.iconScale})`"
              >
                <circle r="4" fill="rgba(0,0,0,1)" />
                <text x="0" y="2" text-anchor="middle" font-size="6" fill="white">×</text>
              </g>
            </g>
          </svg>
        </div>
        
        <!-- ボタン -->
        <div class="mt-6 md:absolute md:bottom-10 flex gap-4">
          <button
            @click="downloadPNG"
            class="px-4 py-2 bg-teal-400 text-white rounded hover:bg-teal-300 hover:scale-105 transition">
            Export as PNG
          </button>
          <button
            @click="downloadICO"
            class="px-4 py-2 bg-teal-400 text-white rounded hover:bg-teal-300 hover:scale-105 transition">
            Export as ICO
          </button>
        </div>
      
      </main>

    </div>

    <script>
      const { createApp, ref, reactive, onMounted, computed, watch } = Vue;

      createApp({
        setup() {

          let draggingTarget = null;
          let offset = { x: 0, y: 0 };

          const state = reactive({
            color: "#fee498",
            color2: "#fcbc19",
            iconColor: "#ffffff",
            shadowColor: "#ff8a1b",
            shadowBlur: 2,
            shadowOpacity: 0.5,
            imagePos: { x: 26, y: 33 },
            iconPos: { x: 27, y: 35 },
            imageSize: 40,
            iconScale: 1.5
          });

          const guide = ref({
            showX: false,
            showY: false
          });

          const CENTER_X = 45;
          const CENTER_Y = 52;

          const selectedIcon = ref(null);
          const selectedLayer = ref(null);
          const isHoveringCanvas = ref(false);
          const isDragging = ref(false);
          const iconQuery = ref(null);
          const imageData = ref(null);
          const iconCenterCache = ref({ x: 0, y: 0 });
          const activeTarget = ref(null);
          const isUIVisible = ref(true);

          const pointers = new Map();
          let lastDistance = 0;

          const isTouchDevice = 'ontouchstart' in window;

          let dragMoved = false;

          // アイコンフィルタ
          const filteredIcons = computed(() => {
            const q = (iconQuery.value || "").toLowerCase();

            return icons.filter(i =>
              i.name.toLowerCase().includes(q)
            );
          });

          // SVG座標変換
          const getSVGPoint = (e) => {
            const svg = document.querySelector("#my-folder");
            const rect = svg.getBoundingClientRect();

            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;

            // viewBox(90x90)に変換
            return {
              x: x * 90,
              y: y * 90
            };
          };

          // アイコン中心取得
          const getIconCenterOffset = (icon) => {
            const svgNS = "http://www.w3.org/2000/svg";
            
            const svg = document.createElementNS(svgNS, "svg");
            const g = document.createElementNS(svgNS, "g");
            
            icon.path.forEach(p => {
              const path = document.createElementNS(svgNS, "path");
              path.setAttribute("d", p.d);
              g.appendChild(path);
            });
            
            svg.appendChild(g);
            document.body.appendChild(svg);
            
            const bbox = g.getBBox();
            document.body.removeChild(svg);
            
            return {
              x: bbox.x + bbox.width / 2,
              y: bbox.y + bbox.height / 2
            };
          };

          // 中心オフセット
          const iconCenterOffset = computed(() => {
            if (!selectedIcon.value) return { x: 0, y: 0 }
            return getIconCenterOffset(selectedIcon.value)
          })

          // ドラッグ開始
          const startDrag = (e, type) => {
            e.preventDefault();
            e.stopPropagation();

            draggingTarget = type;
            dragMoved = false;

            const p = getSVGPoint(e);
            const target = state[type + "Pos"];

            offset.x = p.x - target.x;
            offset.y = p.y - target.y;
            
            window.addEventListener('pointermove', onDrag);
            window.addEventListener('pointerup', stopDrag);
            window.addEventListener('pointercancel', stopDrag);
          }

          // ドラッグ中
          const onDrag = (e) => {
            if (!draggingTarget) return;

            dragMoved = true;
            isDragging.value = true;

            const p = getSVGPoint(e);
            const target = state[draggingTarget + "Pos"];

            let x = p.x - offset.x;
            let y = p.y - offset.y;

            // アイコンの中心を計算
            let cx = x;
            let cy = y;

            const SNAP_RANGE = 4;

            // ガイド判定
            guide.value.showX = Math.abs(cx - CENTER_X) < SNAP_RANGE;
            guide.value.showY = Math.abs(cy - CENTER_Y) < SNAP_RANGE;

            // スナップ
            if (guide.value.showX) {
              x = CENTER_X;
            } else {
              x += (CENTER_X - cx) * 0.4;
            }

            if (guide.value.showY) {
              y = CENTER_Y;
            } else {
              y += (CENTER_Y - cy) * 0.4;
            }              

            target.x = x;
            target.y = y;
          };

          // ドラッグ終了
          const stopDrag = () => {
            draggingTarget = null;
            isDragging.value = false;
            guide.value.showX = false;
            guide.value.showY = false;

            window.removeEventListener('pointermove', onDrag);
            window.removeEventListener('pointerup', stopDrag);
            window.removeEventListener('pointercancel', stopDrag);

            setTimeout(() => { dragMoved = false; }, 0);
          };

          const onIconClick = () => {
            if (!dragMoved) activeTarget.value = 'icon';
          };
          const onImageClick = () => {
            if (!dragMoved) activeTarget.value = 'image';
          };

          const onCanvasClick = (e) => {
            if (dragMoved) {
              dragMoved = false;
              return;
            }
            activeTarget.value = null;
          };

          // アイコン選択
          const selectIcon = (icon) => {
            selectedIcon.value = icon;
            iconCenterCache.value = getIconCenterOffset(icon);

            activeTarget.value = 'icon';

            updateIconBBox(icon);

            state.iconPos.x = CENTER_X;
            state.iconPos.y = CENTER_Y;
          };

          // リサイズ
          const onWheel = (e) => {
            const delta = -e.deltaY * 0.01;

            if (activeTarget.value === 'icon') {
              state.iconScale += delta * 0.5;
              //state.iconScale = Math.max(0.5, Math.min(4, state.iconScale));
            }
            if (activeTarget.value === 'image') {
              state.imageSize += delta * 10;
              // state.imageSize = Math.max(10, Math.min(200, state.imageSize));
            }
          };

          const resetGuide = () => {
            draggingTarget = null;
            isDragging.value = false;
            guide.value.showX = false;
            guide.value.showY = false;
          };

          const onPointerDown = (e) => {
            pointers.set(e.pointerId, e);
          }

          const onPointerMove = (e) => {
            if (!pointers.has(e.pointerId)) return;
            pointers.set(e.pointerId, e);

            if (pointers.size === 2) {
              const pts = Array.from(pointers.values());

              const dx = pts[0].clientX - pts[1].clientX;
              const dy = pts[0].clientY - pts[1].clientY;
              const dist = Math.sqrt(dx * dx + dy * dy);

              if (lastDistance) {
                const delta = dist - lastDistance;

                if (activeTarget.value === "icon") {
                  state.iconScale += delta * 0.01;
                  state.iconScale = Math.max(0.5, Math.min(4, state.iconScale));
                }

                if (activeTarget.value === "image") {
                  state.imageSize += delta * 0.1;
                  state.imageSize = Math.max(20, Math.min(200, state.imageSize));
                }
              }

              lastDistance = dist;
            }
          };

          const onPointerUp = (e) => {
            pointers.delete(e.pointerId);

            if (pointers.size < 2) {
              lastDistance = 0;
            }
          };

          // 画像アップロード
          const onImageUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (ev) => {
              imageData.value = ev.target.result;
              
              state.imagePos.x = CENTER_X;
              state.imagePos.y = CENTER_Y;
            };
            reader.readAsDataURL(file);
          };

          const removeImage = () => {
            imageData.value = null;
            state.imageSize = 40;
          };

          const removeIcon = () => {
            selectedIcon.value = null;
            iconCenterCache.value = { x: 0, y: 0 };;
            state.iconScale = 1.5;
          };

          window.addEventListener("keydown", (e) => {
            if (e.key === "Delete") {
              if (selectedIcon.value) removeIcon();
              else if (imageData.value) removeImage();
            }
          });

          const iconBBox = ref({ x: 0, y: 0, width: 0, height: 0 });

          const updateIconBBox = (icon) => {
            const svgNS = "http://www.w3.org/2000/svg";
            const svg = document.createElementNS(svgNS, "svg");
            const g = document.createElementNS(svgNS, "g");

            icon.path.forEach(p => {
              const path = document.createElementNS(svgNS, "path");
              path.setAttribute("d", p.d);
              g.appendChild(path);
            });

            svg.appendChild(g);
            document.body.appendChild(svg);

            const bbox = g.getBBox();
            document.body.removeChild(svg);

            iconBBox.value = {
              x: bbox.x,
              y: bbox.y,
              width: bbox.width,
              height: bbox.height,
              // 中心オフセット（translate で使う値と同じ）
              cx: bbox.x + bbox.width / 2,
              cy: bbox.y + bbox.height / 2,
            };
          };

          // PNG書き出し
          const downloadPNG = () => {
            const svg = document.querySelector("#my-folder");
            const xml = new XMLSerializer().serializeToString(svg);

            const img = new Image();
            const blob = new Blob([xml], { type: "image/svg+xml;charset=utf-8" });
            const url = URL.createObjectURL(blob);

            img.onload = () => {
              const canvas = document.createElement("canvas");
              canvas.width = 256;
              canvas.height = 256;
              const ctx = canvas.getContext("2d");

              ctx.drawImage(img, 0, 0, 256, 256);

              const link = document.createElement("a");
              link.download = "icon.png";
              link.href = canvas.toDataURL("image/png");
              link.click();
              
              URL.revokeObjectURL(url);
            };

            img.src = url;
          };

          const createMultiSizeICO = async (img) => {
            const sizes = [16, 32, 48, 256];

            const pngBuffers = [];

            // 各サイズのPNGを作る
            for (let size of sizes) {
              const canvas = document.createElement("canvas");
              canvas.width = size;
              canvas.height = size;
              const ctx = canvas.getContext("2d");

              ctx.drawImage(img, 0, 0, size, size);

              const blob = await new Promise(resolve =>
                canvas.toBlob(resolve, "image/png")
              );

              const buffer = new Uint8Array(await blob.arrayBuffer());
              pngBuffers.push({ size, buffer });
            }

            const headerSize = 6;
            const dirSize = 16 * pngBuffers.length;

            let offset = headerSize + dirSize;
            const totalSize =
              offset + pngBuffers.reduce((sum, p) => sum + p.buffer.length, 0);

            const arrayBuffer = new ArrayBuffer(totalSize);
            const view = new DataView(arrayBuffer);
            const bytes = new Uint8Array(arrayBuffer);

            // === ICONDIR ===
            view.setUint16(0, 0, true);
            view.setUint16(2, 1, true);
            view.setUint16(4, pngBuffers.length, true);

            // === ICONDIRENTRY ===
            let currentOffset = offset;

            pngBuffers.forEach((p, i) => {
              const base = 6 + i * 16;

              bytes[base + 0] = p.size === 256 ? 0 : p.size;
              bytes[base + 1] = p.size === 256 ? 0 : p.size;
              bytes[base + 2] = 0;
              bytes[base + 3] = 0;

              view.setUint16(base + 4, 1, true);
              view.setUint16(base + 6, 32, true);

              view.setUint32(base + 8, p.buffer.length, true);
              view.setUint32(base + 12, currentOffset, true);

              bytes.set(p.buffer, currentOffset);

              currentOffset += p.buffer.length;
            });

            return new Blob([arrayBuffer], { type: "image/x-icon" });
          };

          const downloadICO = () => {
            const svg = document.querySelector("#my-folder");
            const xml = new XMLSerializer().serializeToString(svg);

            const img = new Image();
            const blob = new Blob([xml], { type: "image/svg+xml;charset=utf-8" });
            const url = URL.createObjectURL(blob);

            img.onload = async () => {
              const icoBlob = await createMultiSizeICO(img);

              const link = document.createElement("a");
              link.download = "icon.ico";
              link.href = URL.createObjectURL(icoBlob);
              link.click();

              URL.revokeObjectURL(url);
            };

            img.src = url;
          };

          // Pickr
          let pickr, pickr2, pickrIcon, pickrShadow;

          const createPicker = (el, defaultColor, onChange) => {
            const p = Pickr.create({
              el,
              theme: "nano",
              default: defaultColor,
              swatches: [
                'rgba(244, 67, 54, 1)',
                'rgba(233, 30, 99, 1)',
                'rgba(156, 39, 176, 1)',
                'rgba(103, 58, 183, 1)',
                'rgba(63, 81, 181, 1)',
                'rgba(33, 150, 243, 1)',
                'rgba(3, 169, 244, 1)',
                'rgba(0, 188, 212, 1)',
                'rgba(0, 150, 136, 1)',
                'rgba(76, 175, 80, 1)',
                'rgba(139, 195, 74, 1)',
                'rgba(205, 220, 57, 1)',
                'rgba(255, 235, 59, 1)',
                'rgba(255, 193, 7, 1)'
              ],
              components: {
                palette: true,
                preview: true,
                hue: true,
                interaction: { hex: true, input: true }
              }
            });

            p.on("change", (color) => {
              const hex = color.toHEXA().toString();
              onChange(hex);
              p.getRoot().button.style.setProperty("--pcr-color", hex);
            });

            return p;
          };

          const initPickr = () => {
            pickr = createPicker("#color-picker", state.color, v => state.color = v);
            pickr2 = createPicker("#color-picker-2", state.color2, v => state.color2 = v);
            pickrIcon = createPicker("#color-picker-icon", state.iconColor, v => state.iconColor = v);
            pickrShadow = createPicker("#color-picker-shadow", state.shadowColor, v => state.shadowColor = v);
          };

          onMounted(initPickr);

          watch(isDragging, (v) => {
            document.body.style.cursor = v ? 'grabbing' : '';
          });
          
          return {
            state,
            iconCenterCache,
            startDrag,
            onDrag,
            stopDrag,
            iconQuery,
            filteredIcons,
            selectIcon,
            selectedIcon,
            selectedLayer,
            isHoveringCanvas,
            isDragging,
            imageData,
            onWheel,
            onImageUpload,
            downloadPNG,
            downloadICO,
            iconCenterOffset,
            guide,
            removeImage,
            removeIcon,
            onPointerDown,
            onPointerMove,
            onPointerUp,
            isUIVisible,
            onIconClick,
            onImageClick,
            onCanvasClick,
            iconBBox,
            updateIconBBox,
            activeTarget
          };
        }
      }).mount("#app");
      </script>
  </body>
</html>
